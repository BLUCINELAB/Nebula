<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula Companion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100 text-gray-800">
  <main class="p-4 w-full max-w-md bg-white rounded shadow">
    <h1 class="text-2xl mb-4 text-center">Nebula Companion</h1>
    <section class="mb-4">
      <h2 class="text-lg mb-2">Domanda del giorno</h2>
      <p id="question" class="mb-2"></p>
      <textarea id="answer" class="w-full p-2 border rounded mb-2" rows="4" placeholder="La tua risposta..."></textarea>
    </section>
    <section>
      <h2 class="text-lg mb-2">Ispirazione</h2>
      <p id="phrase" class="italic"></p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
